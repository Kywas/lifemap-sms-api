services:
  - type: web
    name: lifemap-sms-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SMSRU_API_ID
        sync: false
      - key: APP_SECRET
        generateValue: true
